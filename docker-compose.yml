services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - 8765:8000
    environment:
      - DATABASE_URL=sqlite:////app/data/codex_system.db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-colored}
      - CODEX_PLUGINS_DIR=/app/plugins
      - OPENGRAPH_IO_API_KEY=${OPENGRAPH_IO_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8065/oauth/callback}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    volumes:
      - ./data:/app/data
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python -m codex.main"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=sqlite:////app/data/codex_system.db
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-plain}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    volumes:
      - ./data:/app/data
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: arq codex.worker.settings.WorkerSettings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 8065:80
    volumes:
      # Plugin assets served by nginx via `alias /plugins/` in nginx.conf
      - ./backend/plugins:/plugins:ro
    depends_on:
      - backend
    restart: unless-stopped
