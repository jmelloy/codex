services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - 8765:8000
    environment:
      - DATABASE_URL=sqlite:////app/data/codex_system.db
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-colored}
      - CODEX_PLUGINS_DIR=/app/plugins
      - OPENGRAPH_IO_API_KEY=${OPENGRAPH_IO_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8065/oauth/callback}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
    volumes:
      - ./data:/app/data
      - ./backend:/app
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && python -m codex.main"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - 8065:5173
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      - VITE_PROXY_TARGET=http://backend:8000
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  frontend-node-modules:
