services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 8765:8000
    environment:
      - DATABASE_URL=sqlite:////app/data/codex_system.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-colored}
      - PYTHONUNBUFFERED=1
      - CODEX_PLUGINS_DIR=/app/plugins
      - CODEX_PLUGINS_DEV=${CODEX_PLUGINS_DEV:-true}
      - CODEX_PLUGIN_S3_BUCKET=${CODEX_PLUGIN_S3_BUCKET:-}
      - CODEX_PLUGIN_DYNAMO_TABLE=${CODEX_PLUGIN_DYNAMO_TABLE:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - OPENGRAPH_IO_API_KEY=${OPENGRAPH_IO_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8065/oauth/callback}
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && python -m codex.main"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 8065:80
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
