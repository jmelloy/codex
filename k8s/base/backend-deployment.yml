apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: codex
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: codex
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: codex
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/codex-backend:latest # replaced by Kustomize overlay
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: codex-config
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: SECRET_KEY
            - name: OPENGRAPH_IO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: OPENGRAPH_IO_API_KEY
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: plugins
              mountPath: /app/plugins
          command: ["sh", "-c", "alembic upgrade head && python -m codex.main"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "2"
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: codex-data
        - name: plugins
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: codex
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: codex
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
