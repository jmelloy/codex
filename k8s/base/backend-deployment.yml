apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: codex
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: codex
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: codex
    spec:
      initContainers:
        # Run migrations once before the main container starts.
        # Multiple pods may race here but Alembic uses DB-level locking,
        # so concurrent upgrade attempts are safe (one wins, others no-op).
        - name: migrate
          image: ghcr.io/OWNER/codex-backend:latest # replaced by Kustomize overlay
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: codex-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      containers:
        - name: backend
          image: ghcr.io/OWNER/codex-backend:latest # replaced by Kustomize overlay
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: codex-config
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: SECRET_KEY
            - name: OPENGRAPH_IO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: OPENGRAPH_IO_API_KEY
                  optional: true
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-secrets
                  key: VOYAGE_API_KEY
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: plugins
              mountPath: /app/plugins
          command: ["python", "-m", "codex.main"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 192Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: codex-data
        - name: plugins
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: codex
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: codex
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
