apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-config
  namespace: codex
  labels:
    app.kubernetes.io/part-of: codex
data:
  DATABASE_URL: "sqlite:////app/data/codex_system.db"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "plain"
  CODEX_PLUGINS_DIR: "/app/plugins"
  PLUGIN_SERVICE_URL: "http://plugin-service:8090"
  PLUGIN_AUTO_SYNC: "true"
