apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-config
  namespace: codex
  labels:
    app.kubernetes.io/part-of: codex
data:
  DATABASE_URL: "sqlite:////app/data/codex_system.db"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "plain"
  CODEX_PLUGINS_DIR: "/app/plugins"
  CODEX_PLUGINS_DEV: "false"
  CODEX_PLUGIN_S3_BUCKET: "codex-plugins-production"
  CODEX_PLUGIN_DYNAMO_TABLE: "codex-plugin-registry-production"
  AWS_DEFAULT_REGION: "us-east-1"
