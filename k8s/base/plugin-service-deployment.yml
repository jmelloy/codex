apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin-service
  namespace: codex
  labels:
    app.kubernetes.io/name: plugin-service
    app.kubernetes.io/part-of: codex
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plugin-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plugin-service
        app.kubernetes.io/part-of: codex
    spec:
      containers:
        - name: plugin-service
          image: ghcr.io/OWNER/codex-plugin-service:latest # replaced by Kustomize overlay
          ports:
            - containerPort: 8090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: codex-config
          env:
            - name: PLUGIN_SERVICE_DIR
              value: "/app/plugins"
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: plugin-service
  namespace: codex
  labels:
    app.kubernetes.io/name: plugin-service
    app.kubernetes.io/part-of: codex
spec:
  selector:
    app.kubernetes.io/name: plugin-service
  ports:
    - port: 8090
      targetPort: 8090
      protocol: TCP
