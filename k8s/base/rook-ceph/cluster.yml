# Rook-Ceph CephCluster — minimal config for Linode LKE
#
# This creates a Ceph cluster using available node storage.
# Adjust resource requests and device filters for your node sizes.
#
apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    # Use a recent stable Ceph release
    image: quay.io/ceph/ceph:v19.2
    allowUnsupported: false
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    allowMultiplePerNode: false
    modules:
      - name: pg_autoscaler
        enabled: true
  dashboard:
    enabled: false
  storage:
    useAllNodes: true
    useAllDevices: true
    # On Linode, nodes typically have unformatted block devices.
    # If your nodes use specific device paths, set deviceFilter instead:
    #   deviceFilter: "^sd[b-z]"
  resources:
    mon:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    mgr:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    osd:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: "2"
        memory: 2Gi
