# CephFilesystem — provides the shared filesystem (CephFS) for ReadWriteMany PVCs
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: codex-cephfs
  namespace: rook-ceph
spec:
  metadataPool:
    replicated:
      size: 1
  dataPools:
    - name: data0
      replicated:
        size: 1
  preserveFilesystemOnDelete: true
  metadataServer:
    activeCount: 1
    activeStandby: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
