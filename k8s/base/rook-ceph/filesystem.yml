# CephFilesystem — provides the shared filesystem (CephFS) for ReadWriteMany PVCs
apiVersion: ceph.rook.io/v1
kind: CephFilesystem
metadata:
  name: codex-cephfs
  namespace: rook-ceph
spec:
  metadataPool:
    replicated:
      size: 3
  dataPools:
    - name: data0
      replicated:
        size: 3
  preserveFilesystemOnDelete: true
  metadataServer:
    activeCount: 1
    activeStandby: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
