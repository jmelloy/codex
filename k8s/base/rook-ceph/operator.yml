# Rook-Ceph Operator
#
# This file references the upstream Rook operator manifests.
# In production, install via Helm for easier version management:
#
#   helm repo add rook-release https://charts.rook.io/release
#   helm install --create-namespace --namespace rook-ceph rook-ceph rook-release/rook-ceph
#
# The setup-lke.sh script handles this automatically.
# This file exists as documentation and for manual/kustomize-based installs.
#
# See: https://rook.io/docs/rook/latest/Getting-Started/quickstart/
